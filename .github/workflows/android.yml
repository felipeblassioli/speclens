name: Android CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  GRADLE_VERSION: '9.3.1'
  JAVA_VERSION: '17'

jobs:
  build-and-unit-tests:
    name: Build and unit tests
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.1
        with:
          packages: >-
            platform-tools
            platforms;android-36
            build-tools;36.0.0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Restore debug signing key
        run: base64 --decode debug.keystore.base64 > debug.keystore

      - name: Build debug APK and run unit tests
        run: gradle --no-daemon :app:assembleDebug :app:testDebugUnitTest

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: unit-test-reports
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore

  instrumentation-tests:
    name: Instrumentation tests
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.1
        with:
          packages: >-
            platform-tools
            platforms;android-36
            build-tools;36.0.0
            emulator
            system-images;android-35;google_apis;x86_64

      - name: Enable KVM permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Restore debug signing key
        run: base64 --decode debug.keystore.base64 > debug.keystore

      - name: Run instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2.37.0
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: gradle --no-daemon :app:connectedDebugAndroidTest

      - name: Upload instrumentation test reports
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: instrumentation-test-reports
          path: app/build/reports/androidTests/connected
          if-no-files-found: ignore
